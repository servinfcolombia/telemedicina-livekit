services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "7888:7888"
    command: >
      --keys "APIUTCtpP7uaVRG: A3xGzgKfgyMejcdXCtOnyXdSN2dfgDz6T4OeQPNUi0EC"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7880/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - telemedicina

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - telemedicina

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-telemedicina}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-telemedicina}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemedicina"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - telemedicina

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - telemedicina

  jitsi:
    image: jitsi/web:latest
    container_name: jitsi
    ports:
      - "8080:80"
      - "8443:443"
      - "10000:10000/udp"
    environment:
      - JICOFO_AUTH_PASSWORD=secretpassword
      - JVB_AUTH_PASSWORD=secretpassword
      - JIBRI_XMPP_PASSWORD=secretpassword
      - JIBRI_RECORDER_PASSWORD=secretpassword
      - PUBLIC_URL=https://localhost:8443
      - TZ=America/Bogota
    volumes:
      - ./jitsi/config:/config
      - ./jitsi/transcripts:/transcripts
    restart: unless-stopped
    networks:
      - telemedicina

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper
    ports:
      - "9002:9000"
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
      - ASR_LANGUAGE=es
    volumes:
      - whisper_models:/root/.cache/whisper
    restart: unless-stopped
    networks:
      - telemedicina

  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
    environment:
      - TURN_SECRET_KEY=${TURN_SECRET:-turnsecret}
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped
    networks:
      - telemedicina

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    restart: unless-stopped
    depends_on:
      - livekit
      - minio
    networks:
      - telemedicina

volumes:
  redis_data:
  postgres_data:
  minio_data:
  caddy_data:
  whisper_models:

networks:
  telemedicina:
    driver: bridge
