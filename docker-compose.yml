services:
  postgres:
    image: postgres:15-alpine
    container_name: telemedicina-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-telemedicina}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-6cc4fe60b2f494cb8ebc2b23300942b4}
      - POSTGRES_DB=${POSTGRES_DB:-telemedicina}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemedicina"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - telemedicina

  redis:
    image: redis:7-alpine
    container_name: telemedicina-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - telemedicina

  minio:
    image: minio/minio:latest
    container_name: telemedicina-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-51820dacc70cc90c931125cca6274571}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - telemedicina

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: telemedicina-whisper
    ports:
      - "9002:9000"
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
      - ASR_LANGUAGE=es
    volumes:
      - whisper_models:/root/.cache/whisper
    restart: unless-stopped
    networks:
      - telemedicina

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telemedicina-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://telemedicina:6cc4fe60b2f494cb8ebc2b23300942b4@postgres:5432/telemedicina
      - SECRET_KEY=${SECRET_KEY:-aad09369a1e0044e016600fd61d83fb16bd60ba1d63050ba2a3a7a1b2e4364d8}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-51820dacc70cc90c931125cca6274571}
      - MINIO_BUCKET_NAME=recordings
      - WHISPER_SERVER_URL=http://whisper:9000/asr
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
    volumes:
      - backend_recordings:/app/recordings
      - backend_transcriptions:/app/transcriptions
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      whisper:
        condition: service_started
    networks:
      - telemedicina

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: telemedicina-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - INTERNAL_API_URL=http://telemedicina-backend:8000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-aad09369a1e0044e016600fd61d83fb16bd60ba1d63050ba2a3a7a1b2e4364d8}
      - NEXTAUTH_URL=http://localhost:3000
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - telemedicina

volumes:
  postgres_data:
  redis_data:
  minio_data:
  whisper_models:
  backend_recordings:
  backend_transcriptions:

networks:
  telemedicina:
    driver: bridge
