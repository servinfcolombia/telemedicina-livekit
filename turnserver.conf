# CoTurn configuration for Telemedicina

# Listening port
listening-port=3478
tls-listening-port=5349

# Listening address
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# External IP
external-ip=0.0.0.0

# Authentication
secret-key=turnsecret
realm=telemedicina.local

# Security
max-allocate-life-time=3600
channel-life-time=600
stale-nonce=300

# Limits
max-bps=1000000
total-quota=100
bps-capacity=0

# Logging
log-file=/var/log/turnserver.log
syslog

# STUN
stun-only=0

# Additional features
redis-userdb=
redis-statsdb=
